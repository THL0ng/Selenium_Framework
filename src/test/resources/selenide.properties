# src/test/resources/selenide.properties
selenide.browser=chrome
selenide.headless=false
selenide.timeout=5000
selenide.reportsFolder=target/reports/tests
selenide.startMaximized=true
# Tự động tắt các thông báo pop-up/notification khó chịu của Chrome
selenide.chromeoptions.args=--disable-notifications,--disable-popup-blocking